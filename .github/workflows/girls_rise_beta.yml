name: Girls Rise Beta Build

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab only

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: girls_rise

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: girls-rise-beta-android
          path: girls_rise/build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: girls_rise

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Unsigned IPA
        run: flutter build ipa --no-codesign

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: girls-rise-beta-ios
          path: girls_rise/build/ios/archive/Runner.xcarchive
